<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Home</h1>
    <p id="frase"></p>
    <a href="http://localhost:3000/frase">Frase JSON</a>

    <script>
        fetch('/frase') // http://localhost:3000/frase -> não se usa, ja estamos no servidor localhost:3000
        .then(res => res.json()) // transforma em json
        .then(data => {
            document.getElementById('frase').textContent = data.frase
        })
    </script>
</body>
</html>
